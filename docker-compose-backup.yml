version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tulsihealth-postgres
    environment:
      POSTGRES_DB: tulsihealth
      POSTGRES_USER: tulsi_admin
      POSTGRES_PASSWORD: secure_password_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - tulsihealth-network

  redis:
    image: redis:7-alpine
    container_name: tulsihealth-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tulsihealth-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tulsihealth-backend
    environment:
      DATABASE_URL: postgresql://tulsi_admin:secure_password_2024@postgres:5432/tulsihealth
      REDIS_URL: redis://redis:6379
      SECRET_KEY: your-super-secret-key-change-in-production
      ABHA_CLIENT_ID: your-abha-client-id
      ABHA_CLIENT_SECRET: your-abha-client-secret
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
    networks:
      - tulsihealth-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tulsihealth-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_ENVIRONMENT: development
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - tulsihealth-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: tulsihealth-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - tulsihealth-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  tulsihealth-network:
    driver: bridge
