app = "tulsihealth-backend"
primary_region = "bom"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[mounts]
  source = "tulsi_data"
  destination = "/app/data"

[env]
  DATABASE_URL = "sqlite+aiosqlite:////app/data/tulsihealth.db"
